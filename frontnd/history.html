<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chat History — Browse and search your past conversations with CalHelpr.">
    <title>Chat History — CalHelpr</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Allerta+Stencil&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <a href="index.html" class="sidebar-brand">
                <span class="brand-text">CalHelpr</span>
                <i class="bi bi-plus-lg brand-cross"></i>
            </a>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item" id="nav-new-chat-hist">
                    <i class="fa-regular fa-pen-to-square"></i>
                    <span>New Chat</span>
                </a>
                <a href="history.html" class="nav-item active" id="nav-library-hist">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    <span>History</span>
                </a>
                <a href="documents.html" class="nav-item" id="nav-documents">
                    <i class="fa-solid fa-file-medical"></i>
                    <span>My Documents</span>
                </a>
            </nav>

            <div class="sidebar-divider"></div>

            <nav class="sidebar-nav">
                <a href="emergency.html" class="nav-item nav-emergency" id="nav-emergency-sidebar-hist">
                    <div class="emergency-icon">
                        <i class="bi bi-plus-lg"></i>
                    </div>
                    <span>Emergency Numbers</span>
                </a>
            </nav>

            <div class="sidebar-content">
                <p class="sidebar-section-label">Recent</p>
                <div class="chat-list"></div>
            </div>

            <div class="sidebar-footer">
                <p class="sidebar-signin-prompt" id="sidebar-signin-text">
                    <a href="login.html">Sign in</a> to save your conversations.
                </p>
                <div class="user-profile">
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                    <span id="sidebar-name">Guest</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <a href="index.html" class="mobile-logo">
                    <span class="brand-text">CalHelpr</span>
                    <i class="bi bi-plus-lg brand-cross"></i>
                </a>
                <div class="spacer"></div>
                <a href="login.html" class="sign-in-btn" id="sign-in-link-history">Sign In</a>
            </header>

            <div class="history-page">
                <div class="history-search-wrap">
                    <div class="history-search-box">
                        <i class="fa-solid fa-magnifying-glass history-search-icon"></i>
                        <input type="text" id="history-search-input" class="history-search-input"
                            placeholder="Search conversations...">
                    </div>
                </div>

                <div class="history-list" id="history-list"></div>
            </div>
        </main>

        <nav class="mobile-bottom-bar">
            <a href="index.html" class="bottom-bar-item" id="nav-chat">
                <i class="fa-regular fa-message"></i>
                <span>Chat</span>
            </a>
            <a href="emergency.html" class="bottom-bar-item emergency-mobile active" id="nav-emergency">
                <div class="emergency-icon-mobile">
                    <i class="bi bi-plus-lg"></i>
                </div>
                <span>Emergency</span>
            </a>
            <a href="history.html" class="bottom-bar-item" id="nav-history">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>History</span>
            </a>
            <a href="documents.html" class="bottom-bar-item" id="nav-documents-mobile">
                <i class="fa-solid fa-file-medical"></i>
                <span>Docs</span>
            </a>
        </nav>
    </div>

    <script src="history.js"></script>
</body>

</html>
